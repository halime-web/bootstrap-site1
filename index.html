<!doctype html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultimate Proje</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body[data-theme="dark"] {
      background: #121212;
      color: white;
    }

    .hero {
      background: linear-gradient(135deg, #0d6efd, #6f42c1);
      color: white;
      padding: 120px 0;
    }

    .animate {
      opacity: 0;
      transform: translateY(30px);
      transition: 0.6s;
    }

    .animate.show {
      opacity: 1;
      transform: translateY(0);
    }

    .dashboard {
      display: none;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">ProX</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Ana Sayfa</a></li>
        <li class="nav-item"><button class="btn btn-outline-light ms-2" data-bs-toggle="modal" data-bs-target="#loginModal">Giriş</button></li>
        <li class="nav-item"><button class="btn btn-warning ms-2" onclick="toggleTheme()">🌙</button></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero text-center">
  <div class="container">
    <h1 class="display-4">Ultimate Frontend Proje 🚀</h1>
    <p class="lead">Full özellikli modern site</p>
    <button class="btn btn-light btn-lg" onclick="showDashboard()">Dashboard'a Git</button>
  </div>
</section>

<!-- FEATURES -->
<section class="py-5">
  <div class="container text-center">
    <div class="row">

      <div class="col-md-4 animate">
        <h4>⚡ Hızlı</h4>
      </div>

      <div class="col-md-4 animate">
        <h4>🔒 Güvenli</h4>
      </div>

      <div class="col-md-4 animate">
        <h4>☁️ Bulut</h4>
      </div>

    </div>
  </div>
</section>

<!-- DASHBOARD -->
<section class="dashboard container py-5" id="dashboard">
  <h2>Dashboard</h2>
  <div class="row">
    <div class="col-md-4">
      <div class="card p-3">Kullanıcılar: 120</div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">Satışlar: ₺5400</div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">Ziyaret: 3200</div>
    </div>
  </div>
</section>

<!-- LOGIN MODAL -->
<div class="modal fade" id="loginModal">
  <div class="modal-dialog">
    <div class="modal-content p-4">
      <h4>Giriş Yap</h4>
      <input class="form-control my-2" placeholder="Email">
      <input class="form-control my-2" type="password" placeholder="Şifre">
      <button class="btn btn-primary w-100">Giriş</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // DARK MODE
  function toggleTheme() {
    let body = document.body;
    let theme = body.getAttribute("data-theme");
    body.setAttribute("data-theme", theme === "dark" ? "light" : "dark");
  }

  // ANIMATION ON SCROLL
  const elements = document.querySelectorAll('.animate');
  window.addEventListener('scroll', () => {
    elements.forEach(el => {
      const top = el.getBoundingClientRect().top;
      if (top < window.innerHeight - 50) {
        el.classList.add('show');
      }
    });
  });

  // DASHBOARD
  function showDashboard() {
    document.querySelector('.dashboard').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
  }
</script>

</body>
</html>
